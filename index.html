<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>打雷示範動畫</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;}
  canvas{position:absolute;top:0;left:0;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── setup ────────────────────────────────────────────────
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W=0, H=0;
function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ─── thunder sound ────────────────────────────────────────
let AC = null;
function boom(ms){
  setTimeout(()=>{
    try{
      if(!AC) AC = new(window.AudioContext||window.webkitAudioContext)();
      if(AC.state==='suspended') AC.resume();
      const sr=AC.sampleRate, buf=AC.createBuffer(1,sr*3,sr), d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){
        const t=i/sr, env=Math.exp(-t*1.3)*(t<.07?t/.07:1);
        d[i]=((Math.random()*2-1)*.8+Math.sin(t*35)*.15+Math.sin(t*20)*.1)*env;
      }
      const s=AC.createBufferSource(), f=AC.createBiquadFilter();
      f.type='lowpass'; f.frequency.value=180;
      s.buffer=buf; s.connect(f); f.connect(AC.destination); s.start();
    }catch(e){}
  }, ms);
}

// ─── camera shake ─────────────────────────────────────────
let SX=0, SY=0, SP=0;
function shake(p){ SP=Math.max(SP,p); }
function updateShake(){ if(SP>.2){SX=(Math.random()-.5)*SP;SY=(Math.random()-.5)*SP;SP*=.78;}else{SX=SY=SP=0;} }

let FLASH=0;

// ─── sky ──────────────────────────────────────────────────
function drawSky(){
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#060a18');
  g.addColorStop(.6,'#0c1428');
  g.addColorStop(1,'#141e34');
  cx.fillStyle=g; cx.fillRect(0,0,W,H);
}

// ─── mountains (no filter) ────────────────────────────────
const M1=[[0,.72],[.07,.54],[.13,.61],[.2,.5],[.28,.57],[.36,.48],[.43,.55],[.5,.46],[.58,.52],[.65,.47],[.72,.54],[.8,.49],[.88,.58],[.95,.52],[1,.56],[1,.74]];
const M2=[[0,.82],[.1,.72],[.2,.76],[.32,.68],[.42,.73],[.55,.65],[.65,.71],[.78,.67],[.88,.74],[1,.70],[1,.84]];
function drawMountains(){
  cx.save(); cx.globalAlpha=.55;
  const g1=cx.createLinearGradient(0,H*.45,0,H*.75);
  g1.addColorStop(0,'#1e1e44'); g1.addColorStop(1,'#0e0e22');
  cx.fillStyle=g1; cx.beginPath(); cx.moveTo(0,H*.74);
  M1.forEach(([x,y])=>cx.lineTo(x*W,y*H)); cx.closePath(); cx.fill();
  cx.globalAlpha=.75;
  const g2=cx.createLinearGradient(0,H*.6,0,H*.85);
  g2.addColorStop(0,'#14143a'); g2.addColorStop(1,'#0a0a18');
  cx.fillStyle=g2; cx.beginPath(); cx.moveTo(0,H*.84);
  M2.forEach(([x,y])=>cx.lineTo(x*W,y*H)); cx.closePath(); cx.fill();
  cx.restore();
}

// ─── clouds ───────────────────────────────────────────────
const clouds=Array.from({length:8},()=>({
  x:Math.random()*1200-100, y:30+Math.random()*100,
  r:70+Math.random()*100, spd:.1+Math.random()*.25,
  a:.5+Math.random()*.35, fl:0
}));
function drawClouds(){
  clouds.forEach(c=>{
    c.x+=c.spd; if(c.x>W+200) c.x=-200;
    if(c.fl>0) c.fl=Math.max(0,c.fl-.04);
    cx.save(); cx.globalAlpha=c.a;
    const col=c.fl>0?`rgba(${~~(70+c.fl*185)},${~~(70+c.fl*165)},255,1)`:'#303060';
    const g=cx.createRadialGradient(c.x,c.y,5,c.x,c.y,c.r);
    g.addColorStop(0,col); g.addColorStop(1,'transparent');
    cx.fillStyle=g; cx.beginPath(); cx.arc(c.x,c.y,c.r,0,Math.PI*2); cx.fill();
    cx.restore();
  });
}
function flashClouds(x,v){ clouds.forEach(c=>{ const d=Math.abs(c.x-x); if(d<W*.7) c.fl=Math.max(c.fl,v*(1-d/(W*.7))); }); }

// ─── rain ─────────────────────────────────────────────────
const GY=()=>H*.84;
function mkRain(n,s0,s1,l0,l1,a0,a1,ang){
  return Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H,s:s0+Math.random()*(s1-s0),l:l0+Math.random()*(l1-l0),a:a0+Math.random()*(a1-a0),ang}));
}
// 明顯較亮的雨滴
const rA=mkRain(150, 3, 6, 7,13, .20,.38,-1.2);  // far
const rB=mkRain(200, 7,12,15,26, .28,.48,-2.0);  // mid
const rC=mkRain(120,14,22,26,44, .38,.58,-2.8);  // near

function drawRain(drops,col,lw){
  cx.save(); cx.strokeStyle=col; cx.lineWidth=lw;
  drops.forEach(r=>{
    r.y+=r.s; r.x+=r.ang*.4;
    if(r.y>GY()+24){r.y=-12;r.x=Math.random()*W;}
    if(r.x<-12) r.x=W+20;
    cx.globalAlpha=r.a;
    cx.beginPath(); cx.moveTo(r.x,r.y); cx.lineTo(r.x+r.ang*.35,r.y+r.l); cx.stroke();
  });
  cx.restore();
}

// ─── ground ───────────────────────────────────────────────
function drawGround(){
  const gy=GY();
  const g=cx.createLinearGradient(0,gy,0,H);
  g.addColorStop(0,'#0e0e22'); g.addColorStop(1,'#080814');
  cx.fillStyle=g; cx.fillRect(0,gy,W,H-gy);
  // water sheen
  cx.save(); cx.globalAlpha=.1+FLASH*.28;
  const wg=cx.createLinearGradient(0,gy,0,H);
  wg.addColorStop(0,'#3355cc'); wg.addColorStop(1,'transparent');
  cx.fillStyle=wg; cx.fillRect(0,gy,W,H-gy); cx.restore();
}

// ─── splashes ─────────────────────────────────────────────
const splashes=[];
let sT=0;
function addSplash(x,y){splashes.push({x,y,r:0,a:.45,vr:.6+Math.random()*1});}
function updateSplashes(){
  sT++; if(sT%3===0) addSplash(Math.random()*W,GY()+Math.random()*4);
  for(let i=splashes.length-1;i>=0;i--){
    const s=splashes[i]; s.r+=s.vr; s.a-=.07;
    if(s.a<=0||s.r>5){splashes.splice(i,1);continue;}
    cx.save(); cx.globalAlpha=s.a*.45; cx.strokeStyle='#99bbdd'; cx.lineWidth=.6;
    cx.beginPath(); cx.ellipse(s.x,s.y,s.r,s.r*.22,0,0,Math.PI*2); cx.stroke(); cx.restore();
  }
}

// ─── thunder rings ────────────────────────────────────────
const trings=[];
function addRing(x){ for(let i=0;i<4;i++) trings.push({x,y:GY(),r:i*18,a:.5,dl:i*7}); }
function drawRings(){
  for(let i=trings.length-1;i>=0;i--){
    const t=trings[i]; if(t.dl-->0) continue;
    t.r+=4.5; t.a-=.013; if(t.a<=0){trings.splice(i,1);continue;}
    cx.save(); cx.globalAlpha=t.a; cx.strokeStyle='#aabbff'; cx.lineWidth=1.1;
    cx.beginPath(); cx.ellipse(t.x,t.y,t.r,t.r*.16,0,0,Math.PI*2); cx.stroke(); cx.restore();
  }
}

// ─── ground lightning (top→down branch) ──────────────────
class GLightning{
  constructor(x){
    this.segs=[]; this.a=1; this.fa=1; this.growing=true; this.step=0;
    this._grow(x, H*.04+Math.random()*30, GY(), 0, 0);
  }
  _grow(x,y,tY,dep,ps){
    if(dep>4) return;
    const n=9+~~(Math.random()*5), dh=(tY-y)/n; let cx=x,cy=y;
    for(let i=0;i<n;i++){
      const nx=cx+(Math.random()-.5)*(85-dep*12), ny=cy+dh+(Math.random()-.5)*5, gs=ps+i;
      this.segs.push({x1:cx,y1:cy,x2:nx,y2:ny,d:dep,s:gs});
      if(Math.random()<.28&&dep<3) this._grow(nx,ny,ny+(tY-ny)*(.3+Math.random()*.45),dep+1,gs);
      cx=nx;cy=ny;
    }
    if(dep===0){ const fx=cx; for(let i=0;i<3;i++) setTimeout(()=>addSplash(fx+(Math.random()-.5)*25,GY()),i*18); }
  }
  draw(){
    this.step+=3;
    let mx=0; for(const s of this.segs) if(s.s>mx) mx=s.s;
    if(this.step>=mx) this.growing=false;
    if(this.fa>0){ cx.save(); cx.globalAlpha=this.fa*.25; cx.fillStyle='#ccd6ff'; cx.fillRect(0,0,W,H); cx.restore(); this.fa-=.09; }
    for(const s of this.segs){
      if(s.s>this.step) continue;
      const w=Math.max(.5,5-s.d*.9);
      cx.save();
      cx.globalAlpha=this.a*.22; cx.strokeStyle='#4488ff'; cx.lineWidth=w*6; cx.shadowColor='#88aaff'; cx.shadowBlur=35;
      cx.beginPath(); cx.moveTo(s.x1,s.y1); cx.lineTo(s.x2,s.y2); cx.stroke();
      cx.globalAlpha=this.a; cx.strokeStyle=s.d===0?'#ffffff':'#e0eeff'; cx.lineWidth=w; cx.shadowBlur=12;
      cx.beginPath(); cx.moveTo(s.x1,s.y1); cx.lineTo(s.x2,s.y2); cx.stroke();
      cx.restore();
    }
    if(!this.growing) this.a-=.06;
    return this.a>0;
  }
}

// ─── cloud lightning (horizontal) ────────────────────────
class CLightning{
  constructor(x,y){
    this.segs=[]; this.a=1; this.fa=.5; this.growing=true; this.step=0;
    this._gen(x,y,0,0);
  }
  _gen(x,y,dep,ps){
    if(dep>3) return;
    const n=5+~~(Math.random()*5); let cx=x,cy=y;
    for(let i=0;i<n;i++){
      const nx=cx+(Math.random()-.5)*(108-dep*16), ny=cy+(Math.random()-.5)*(42-dep*7), gs=ps+i;
      this.segs.push({x1:cx,y1:cy,x2:nx,y2:ny,d:dep,s:gs});
      if(Math.random()<.35) this._gen(nx,ny,dep+1,gs);
      cx=nx;cy=ny;
    }
  }
  draw(){
    this.step+=4;
    let mx=0; for(const s of this.segs) if(s.s>mx) mx=s.s;
    if(this.step>=mx) this.growing=false;
    if(this.fa>0){ cx.save(); cx.globalAlpha=this.fa*.1; cx.fillStyle='#9999ee'; cx.fillRect(0,0,W,H); cx.restore(); this.fa-=.07; }
    for(const s of this.segs){
      if(s.s>this.step) continue;
      cx.save();
      cx.globalAlpha=this.a*.18; cx.strokeStyle='#6666ff'; cx.lineWidth=5; cx.shadowColor='#aaaaff'; cx.shadowBlur=22;
      cx.beginPath(); cx.moveTo(s.x1,s.y1); cx.lineTo(s.x2,s.y2); cx.stroke();
      cx.globalAlpha=this.a*.85; cx.strokeStyle='#ccd4ff'; cx.lineWidth=Math.max(.3,2-s.d*.4); cx.shadowBlur=7;
      cx.beginPath(); cx.moveTo(s.x1,s.y1); cx.lineTo(s.x2,s.y2); cx.stroke();
      cx.restore();
    }
    if(!this.growing) this.a-=.06;
    return this.a>0;
  }
}

// ─── lens drops (on separate canvas) ─────────────────────
const lc2=document.createElement('canvas'); lc2.style.cssText='position:absolute;top:0;left:0;z-index:10;pointer-events:none;'; document.body.appendChild(lc2);
const lx2=lc2.getContext('2d');
function resizeLens(){ lc2.width=W; lc2.height=H; }
resizeLens(); window.addEventListener('resize',resizeLens);

let ldrops=[], lfl=0;
function mkDrop(){return{x:Math.random()*W,y:Math.random()*H*.8,r:4+Math.random()*13,vy:.3+Math.random()*1.6,vx:(Math.random()-.5)*.2,a:.3+Math.random()*.45,ra:0,streak:Math.random()<.4,sl:25+Math.random()*60,wb:Math.random()*Math.PI*2,ws:.02+Math.random()*.02};}
ldrops=Array.from({length:30},mkDrop);
function lensFlash(v){lfl=Math.min(1,lfl+v);ldrops.forEach(d=>d.ra=v*(.4+Math.random()*.55));}

function drawLens(){
  lx2.clearRect(0,0,W,H);
  if(lfl>0){ lx2.save(); lx2.globalAlpha=lfl*.15; const fg=lx2.createRadialGradient(W/2,H*.3,0,W/2,H*.3,W*.7); fg.addColorStop(0,'rgba(210,228,255,1)'); fg.addColorStop(1,'transparent'); lx2.fillStyle=fg; lx2.fillRect(0,0,W,H); lx2.restore(); lfl=Math.max(0,lfl-.022); }
  ldrops.forEach(d=>{
    d.wb+=d.ws; d.x+=d.vx+Math.sin(d.wb)*.15; d.y+=d.vy;
    if(d.y>H+50){Object.assign(d,mkDrop());d.y=-5;}
    if(d.ra>0) d.ra=Math.max(0,d.ra-.016);
    lx2.save();
    if(d.streak){const sg=lx2.createLinearGradient(d.x,d.y-d.sl,d.x,d.y);sg.addColorStop(0,'transparent');sg.addColorStop(1,'rgba(140,168,215,.48)');lx2.globalAlpha=d.a*.28;lx2.fillStyle=sg;lx2.fillRect(d.x-d.r*.3,d.y-d.sl,d.r*.6,d.sl);}
    lx2.globalAlpha=d.a;
    const dg=lx2.createRadialGradient(d.x-d.r*.28,d.y-d.r*.28,0,d.x,d.y,d.r);
    dg.addColorStop(0,'rgba(225,238,255,.7)');dg.addColorStop(.5,'rgba(140,170,220,.25)');dg.addColorStop(1,'rgba(88,128,192,.08)');
    lx2.fillStyle=dg;lx2.beginPath();lx2.ellipse(d.x,d.y,d.r,d.r*1.1,0,0,Math.PI*2);lx2.fill();
    lx2.globalAlpha=d.a*.72;lx2.fillStyle='rgba(255,255,255,.62)';lx2.beginPath();lx2.ellipse(d.x-d.r*.27,d.y-d.r*.28,d.r*.2,d.r*.11,-.5,0,Math.PI*2);lx2.fill();
    if(d.ra>0){lx2.globalAlpha=d.ra;const rg=lx2.createRadialGradient(d.x,d.y,0,d.x,d.y,d.r*2.2);rg.addColorStop(0,'rgba(255,248,170,.9)');rg.addColorStop(1,'transparent');lx2.fillStyle=rg;lx2.beginPath();lx2.ellipse(d.x,d.y,d.r*2.2,d.r*1.6,0,0,Math.PI*2);lx2.fill();}
    lx2.restore();
  });
}

// ─── trigger ──────────────────────────────────────────────
const bolts=[];
function trigger(x,type){
  const bx=(x!=null)?x:W*.12+Math.random()*W*.76;
  const cloud=type==='cloud'||(!type&&Math.random()<.35);
  if(cloud){
    bolts.push(new CLightning(bx,28+Math.random()*85));
    flashClouds(bx,.85); lensFlash(.45); shake(3); FLASH=.25; boom(220);
  } else {
    bolts.push(new GLightning(bx));
    addRing(bx); flashClouds(bx,1); lensFlash(1); shake(12); FLASH=.9; boom(160);
  }
}

// ─── auto ─────────────────────────────────────────────────
function scheduleNext(){ setTimeout(()=>{ trigger(null,Math.random()<.38?'cloud':'ground'); scheduleNext(); }, 3000+Math.random()*2000); }

// ─── main loop ────────────────────────────────────────────
function loop(){
  try{
    updateShake();
    cx.save(); cx.translate(SX,SY);
    drawSky();
    drawMountains();
    drawClouds();
    // far rain (slightly transparent overlay to mimic blur)
    cx.save(); cx.globalAlpha=.7; drawRain(rA,'#7788bb',1); cx.restore();
    drawRain(rB,'#99aacc',1);
    drawGround();
    updateSplashes();
    drawRings();
    for(let i=bolts.length-1;i>=0;i--) if(!bolts[i].draw()) bolts.splice(i,1);
    drawRain(rC,'#bbccdd',1.2);
    cx.restore();
    drawLens();
    if(FLASH>0) FLASH=Math.max(0,FLASH-.026);
  }catch(e){ console.error(e); }
  requestAnimationFrame(loop);
}

loop();
scheduleNext();
setTimeout(()=>trigger(W*.5,'ground'), 500);
setTimeout(()=>trigger(W*.3,'cloud'), 2300);
setTimeout(()=>trigger(W*.72,'ground'),3900);
</script>
</body>
</html>
